<script>
// Add to Cart functionality
let buttons = document.querySelectorAll(".product-card button");
let cart = JSON.parse(localStorage.getItem("cart")) || [];

buttons.forEach(button => {
    button.addEventListener("click", ()=>{
        const product = button.parentElement;
        const name = product.querySelector("h3").innerText;
        const price = product.querySelector("p").innerText;
        cart.push({name:name, price:price});
        localStorage.setItem("cart", JSON.stringify(cart));
        alert(name + " added to cart!");
    });
});

// Filter & Search
const productCards = document.querySelectorAll(".product-card");
const searchBox = document.getElementById("search-box");
const filterPrice = document.getElementById("filter-price");

function filterProducts() {
    const searchText = searchBox.value.toLowerCase();
    const priceRange = filterPrice.value;productCards.forEach(card => {
        const name = card.querySelector("h3").innerText.toLowerCase();
        const price = parseFloat(card.querySelector("p").innerText.replace("$",""));
        let match = true;

        if(!name.includes(searchText)) match = false;

        if(priceRange !== "all"){
            const [min,max] = priceRange.split("-").map(Number);
            if(price < min || price > max) match = false;
        }

        card.style.display = match ? "block" : "none";
    });
}

searchBox.addEventListener("input", filterProducts);
filterPrice.addEventListener("change", filterProducts);
</script>
